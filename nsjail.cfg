# Adytum TEE Worker - nsjail Sandbox Configuration
# =================================================
# Isolates untrusted invention code execution with:
# - Namespace isolation (PID, IPC, UTS, mount, user)
# - Resource limits (CPU, memory, file descriptors)
# - No network access
# - Read-only filesystem (except /tmp)

name: "adytum-sandbox"
description: "Sandbox for executing untrusted invention code"

mode: ONCE
hostname: "sandbox"
cwd: "/tmp"

# =============================================================================
# Environment Variables (Explicitly allowed)
# =============================================================================

enve: "PATH=/usr/local/bin:/usr/bin:/bin"
enve: "PYTHONPATH="
enve: "LANG=C.UTF-8"

# Force ML backends to use a single thread to respect CPU limits
enve: "OMP_NUM_THREADS=1"
enve: "OPENBLAS_NUM_THREADS=1"
enve: "MKL_NUM_THREADS=1"
enve: "NUMEXPR_NUM_THREADS=1"

# =============================================================================
# Resource Limits
# =============================================================================

time_limit: 10
rlimit_as: 256
rlimit_cpu: 10
rlimit_fsize: 0

# Python needs more FDs to import numpy/scipy
rlimit_nofile: 128

# Allows basic internal threading for Python/BLAS, prevents fork bombs via PID namespace
rlimit_nproc: 16

# =============================================================================
# Namespace Isolation
# =============================================================================

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true

# =============================================================================
# User Mapping (Run as unprivileged user 'nobody')
# =============================================================================

uidmap {
    inside_id: "65534"
    outside_id: "0"
    count: 1
}

gidmap {
    inside_id: "65534"
    outside_id: "0"
    count: 1
}

# =============================================================================
# Filesystem Mounts (minimal read-only access)
# =============================================================================

mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/usr/local/lib/python3.11"
    dst: "/usr/local/lib/python3.11"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=64M"
}

mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}

mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
}